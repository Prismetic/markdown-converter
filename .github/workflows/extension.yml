name: Extension CI

on:
  push:
    paths:
      - 'packages/extension/**'
      - 'packages/core/**'
      - 'scripts/check-size.sh'
      - '.github/workflows/extension.yml'
  pull_request:
    paths:
      - 'packages/extension/**'
      - 'packages/core/**'
      - 'scripts/check-size.sh'
      - '.github/workflows/extension.yml'

jobs:
  ci:
    name: Build → size → unit tests → E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace deps
        run: npm ci

      - name: Build @tool/core
        run: npm run build
        working-directory: packages/core

      - name: Build extension
        run: npm run build
        working-directory: packages/extension

      - name: Size gate
        run: bash scripts/check-size.sh packages/extension/_dist 2000000

      - name: Unit tests
        run: npm run test:unit
        working-directory: packages/extension

      - name: Install Playwright Chrome
        run: npx playwright install chrome --with-deps
        working-directory: packages/extension

      - name: E2E tests (all 10 formats, headless Chrome)
        run: npm run test:e2e
        working-directory: packages/extension
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/extension/playwright-report/
          retention-days: 7
